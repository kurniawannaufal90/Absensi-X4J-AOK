<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">

  <title>Absensi X4J_AOK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1; 
      --primary-hover: #4f46e5;
      --bg-body: #0f172a;
      --bg-box: #1e293b;
      --white-pure: #ffffff; 
      --text-muted: #94a3b8;
      --input-bg: #334155;
      --border-color: #475569;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      display: flex; justify-content: center; align-items: center; 
      min-height: 100vh; margin: 0; 
      background: var(--bg-body);
      background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
      padding: 20px; 
      color: var(--white-pure);
      overflow-x: hidden;
    }

    .box { 
      background: var(--bg-box); 
      padding: 40px; 
      border-radius: 20px;
      width: 100%; 
      max-width: 450px; 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      border: 1px solid var(--border-color);
      z-index: 10;
    }

    h3 { color: var(--white-pure); text-align: left; margin: 10px 0 2px; font-size: 1.5rem; font-weight: 800; }
    
    .datetime-info { 
      color: var(--white-pure); 
      font-size: 0.75rem; 
      font-weight: 600; 
      margin-bottom: 25px; 
      display: block; 
      letter-spacing: 0.05em; 
    }
    
    .subtitle { color: var(--white-pure); font-size: 0.85rem; margin-bottom: 30px; display: block; }
    
    label { font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 8px; }
    
    select { 
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border-color); border-radius: 10px; 
      box-sizing: border-box; font-size: 0.95rem; background: var(--input-bg);
      color: white; font-family: 'Poppins'; transition: all 0.3s ease;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: var(--primary); background: #1e293b; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
    
    button { 
      width: 100%; padding: 14px; background: var(--primary); color: white; border: none; 
      border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600; 
      margin-top: 10px; transition: all 0.3s ease; 
    }
    button:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }

    #pesan { 
      margin-top: 20px; font-weight: 600; text-align: center; font-size: 0.85rem; 
      padding: 14px; border-radius: 12px; display: none;
    }

    /* Screen Lock Styles */
    #m-screen {
      position: fixed; inset: 0; z-index: 9999; background: #020617;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; visibility: hidden; opacity: 0; transition: opacity 0.4s ease-out;
    }
    #m-screen.show { visibility: visible; opacity: 1; }
    .status-pill { display: inline-flex; align-items: center; gap: 12px; padding: 10px 22px; border-radius: 9999px; margin-bottom: 2.5rem; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #ef4444; position: relative; }
    .dot::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #ef4444; animation: live-pulse 2.5s infinite; }
    @keyframes live-pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(4.5); opacity: 0; } }
    .m-title { font-size: clamp(32px, 8vw, 64px); font-weight: 800; color: #ef4444; margin-bottom: 2rem; line-height: 0.9; }
    .m-datetime { color: var(--white-pure); font-size: 1rem; font-weight: 600; margin-bottom: 2rem; display: block; }
    #m-text { font-size: clamp(16px, 4vw, 22px); color: #94a3b8; max-width: 650px; margin-bottom: 3rem; }
    #m-eta { color: white; font-weight: 700; font-size: 1.5rem; }
  </style>
</head>
<body>

          <option value="Muhamad Daffa Ramadhan|202443501287">Muhamad Daffa Ramadhan - 202443501287</option>
          <option value="Naufal Kurniawan|202443501293">Naufal Kurniawan - 202443501293</option>
          <option value="Rahmad Rizki Ramdani|202443501294">Rahmad Rizki Ramdani - 202443501294</option>
          <option value="Ika Nur Kamila|202443501299">Ika Nur Kamila - 202443501299</option>

        </select>
      </div>

      <div style="margin-bottom: 20px;">
        <label>Status</label>
        <select name="status" required>
          <option value="" disabled selected>Pilih kehadiran</option>
          <option value="Hadir">Hadir</option>

  </div>
  <div id="pesan"></div>
</div>

<div id="m-screen">
  <div class="m-content">
    <div class="status-pill">
      <span class="dot"></span>
      <span style="color: #ef4444; font-weight: 800; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;">System Locked</span>
    </div>
    <h1 class="m-title">Presensi Telah<br>Berakhir.</h1>
    <span id="m-display-time" class="m-datetime">Memuat Waktu...</span>
    <p id="m-text">Maaf, batas waktu absensi hari <span id="namaHari" style="color: white; font-weight: 800;">...</span> jam 10.00 WIB sudah terlewati.</p>
    <div id="m-eta">Memuat Jadwal...</div>
  </div>
</div>

<script>
  const mainApp = document.getElementById('main-app');
  const mScreen = document.getElementById('m-screen');
  const form = document.getElementById('formGue');
  const btn = document.getElementById('tombol');
  const msg = document.getElementById('pesan');
  const displayTime = document.getElementById('display-time');
  const mDisplayTime = document.getElementById('m-display-time');
  const teksHari = document.getElementById('namaHari');
  const mEta = document.getElementById('m-eta');

  // GANTI DENGAN URL SCRIPT ANDA
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxthC39cRnG74ogFxBkmUkXUZpL4nM-xOiGQtb7xSHCLBlJRCwgKr2jk4idX6DQsaK4/exec';

  function updateClock() {
    const sekarang = new Date();
    const listHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jum'at", "Sabtu"];
    const listBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    
    const hari = listHari[sekarang.getDay()];
    const fullTimeStr = `${hari}, ${sekarang.getDate()} ${listBulan[sekarang.getMonth()]} ${sekarang.getFullYear()} • ${sekarang.getHours().toString().padStart(2, '0')}:${sekarang.getMinutes().toString().padStart(2, '0')}:${sekarang.getSeconds().toString().padStart(2, '0')} WIB`;
    
    displayTime.innerText = fullTimeStr;
    mDisplayTime.innerText = fullTimeStr;
  }

  function cekWaktu() {
    updateClock();
    const sekarang = new Date();
    const hari = sekarang.getDay();
    const tglSekarang = sekarang.toISOString().split('T')[0];
    const totalMenit = (sekarang.getHours() * 60) + sekarang.getMinutes();
    
    const isJadwal = (hari === 6 || ["2026-05-03", "2026-05-10", "2026-05-17", "2026-05-24", "2026-05-31"].includes(tglSekarang));
    const isOperational = (totalMenit >= 450 && totalMenit < 600); // 07:30 - 10:00

    const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';

    if (!isAdmin && (!isJadwal || !isOperational)) {
      teksHari.innerText = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jum'at", "Sabtu"][hari];
      mEta.innerText = "Dibuka Kembali: Sabtu Pagi, Jam 07.30 WIB";
      mScreen.classList.add('show');
      mainApp.style.display = 'none';
      return false;
    }

    mScreen.classList.remove('show');
    mainApp.style.display = 'block';
    return true;
  }

  setInterval(cekWaktu, 1000);
  cekWaktu();

  form.addEventListener('submit', e => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerText = "Mengirim...";
    msg.style.display = "none";
    
    fetch(scriptURL, { method: 'POST', body: new FormData(form) })
    .then(res => res.text())
    .then(hasil => {
      msg.style.display = "block";
      if (hasil.includes("Berhasil")) {
        msg.style.background = "rgba(16, 185, 129, 0.15)";
        msg.style.color = "#34d399";
        msg.innerText = "✅ Presensi berhasil dikirim!";
        form.reset();
      } else {
        msg.style.background = "rgba(244, 63, 94, 0.15)";
        msg.style.color = "#fb7185";
        msg.innerText = "⚠️ " + hasil;
      }
    })
    .catch(() => {
      msg.style.display = "block";
      msg.innerText = "❌ Kesalahan koneksi!";
    })
    .finally(() => {
      btn.disabled = false;
      btn.innerText = "Kirim Presensi";
    });
  });
</script>
</body>
</html>
